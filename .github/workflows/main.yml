name: Monitor Telco IA - Test Pro

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalación Limpia
        run: |
          pip install --upgrade pip
          # Eliminamos cualquier rastro de la librería vieja para que no choque con la nueva
          pip uninstall google-generativeai -y 
          pip install -U google-genai playwright
          playwright install chromium

      - name: Ejecutar Agente
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python agente_telco.py
