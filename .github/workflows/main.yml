name: Monitor Telco IA

on:
  workflow_dispatch: # Botón manual en la pestaña Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v3

      - name: Configurar versión de Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar herramientas necesarias
        run: |
          pip install playwright google-generativeai
          playwright install chromium

      - name: Ejecutar el agente de monitoreo
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python agente_telco.py
